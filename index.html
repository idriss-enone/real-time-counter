<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur en Temps Réel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h2>Compteur en temps Réel</h2>
        <textarea id="text-input" placeholder="Commencez à écrire ici..."></textarea>
        <div class="stats">
            <p>Caractères: <span id="char-count">0</span></p>
            <p>Mots: <span id="word-count">0</span></p>
            <p>Temps de lecture: <span id="read-time">0 min</span></p>
        </div>
    </main>
    
</body>
</html>
