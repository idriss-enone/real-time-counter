<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Compteur de texte en temps réel permettant de calculer le nombre de caractères, de mots et le temps de lecture estimé.">
    <meta name="keywords" content="compteur de mots, compteur de caractères, javascript, html, css">
    <meta name="author" content="Idriss Enone">
    <title>Compteur de mots et caractères en temps réel</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <button id="theme-toggle" class="theme-toggle" type="button"
            aria-label="Basculer entre le thème clair et sombre">
            <svg class="icon-sun" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 2v2 M12 20v2 M2 12h2 M20 12h2 M4.93 4.93l1.41 1.41 M17.66 17.66l1.41 1.41 M4.93 19.07l1.41-1.41 M17.66 6.34l1.41-1.41"></path>
            </svg>
            <svg class="icon-moon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"></path>
            </svg>
        </button>
        <h1>Compteur de mots et caractères en temps réel</h1>
        <p id="help-text" class="sr-only">
            Saisissez votre texte pour connaître le nombre de mots,
            de caractères et le temps de lecture estimé.
        </p>
        <label for="text-input" class="sr-only">
            Saisissez votre texte
        </label>
        <textarea id="text-input" placeholder="Commencez à écrire ici..." aria-describedby="help-text"></textarea>
        <div class="stats" aria-live="polite"></div>
    </main>

    <script src="script.js"></script>
</body>

</html>
